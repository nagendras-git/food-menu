<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#000000" id="theme-meta"/>
<title>Food Menu</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root {
  --fs: 16px;
  --bg: #000;
  --bg2: #1c1c1e;
  --bg3: #2c2c2e;
  --bg4: #3a3a3c;
  --fill: rgba(255,255,255,0.08);
  --fill2: rgba(255,255,255,0.04);
  --sep: rgba(255,255,255,0.10);
  --sep2: rgba(255,255,255,0.14);
  --text: #fff;
  --text2: rgba(255,255,255,0.55);
  --text3: rgba(255,255,255,0.28);
  --red: #ff3b30;
  --red-bg: rgba(255,59,48,0.13);
  --green: #34c759;
  --green-bg: rgba(52,199,89,0.12);
  --glass: rgba(28,28,30,0.85);
  --glass-b: rgba(255,255,255,0.10);
  --r: 14px;
  --rlg: 20px;
}
.light {
  --bg: #f2f2f7;
  --bg2: #fff;
  --bg3: #f2f2f7;
  --bg4: #e5e5ea;
  --fill: rgba(0,0,0,0.05);
  --fill2: rgba(0,0,0,0.03);
  --sep: rgba(0,0,0,0.09);
  --sep2: rgba(0,0,0,0.14);
  --text: #000;
  --text2: rgba(0,0,0,0.50);
  --text3: rgba(0,0,0,0.25);
  --red: #e8332a;
  --red-bg: rgba(232,51,42,0.09);
  --green: #28a745;
  --green-bg: rgba(40,167,69,0.09);
  --glass: rgba(255,255,255,0.90);
  --glass-b: rgba(0,0,0,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  font-size: var(--fs);
  background: var(--bg);
  color: var(--text);
  max-width: 430px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  transition: background .3s, color .3s;
}

/* TOPBAR */
.topbar { flex-shrink: 0; padding: 14px 16px 0; }
.topbar-inner { display: flex; align-items: center; justify-content: space-between; height: 44px; }
.topbar-title { font-size: calc(var(--fs)*1.125); font-weight: 700; color: var(--text); }
.topbar-btns { display: flex; gap: 8px; }
.icon-btn {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--fill); border: 1px solid var(--sep2);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: var(--text); transition: background .15s;
}
.icon-btn:active { background: var(--bg4); }
.icon-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

/* BILL STRIP */
.bill-strip {
  margin: 12px 16px 0;
  padding: 16px 18px;
  background: var(--glass);
  border: 1px solid var(--glass-b);
  border-radius: var(--rlg);
  backdrop-filter: blur(40px) saturate(180%);
  -webkit-backdrop-filter: blur(40px) saturate(180%);
  box-shadow: 0 8px 32px rgba(0,0,0,0.18), inset 0 1px 0 rgba(255,255,255,0.06);
  display: flex; align-items: flex-end; justify-content: space-between;
}
.bill-label { font-size: calc(var(--fs)*0.6875); font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .7px; margin-bottom: 4px; }
.bill-total { font-size: calc(var(--fs)*2.4); font-weight: 800; color: var(--red); letter-spacing: -1.5px; line-height: 1; }
.bill-sub { font-size: calc(var(--fs)*0.75); color: var(--text3); margin-top: 5px; }
.validate-btn {
  background: #1db954; border: none; border-radius: 100px;
  padding: 11px 20px; font-size: calc(var(--fs)*0.875); font-weight: 700;
  color: #fff; cursor: pointer; font-family: inherit;
  display: flex; align-items: center; gap: 7px;
  box-shadow: 0 4px 18px rgba(29,185,84,0.38);
  transition: opacity .15s;
}
.validate-btn:active { opacity: .8; }
.validate-btn svg { width: 14px; height: 14px; stroke: #fff; fill: none; stroke-width: 2.2; stroke-linecap: round; }

/* ADD SECTION */
.add-sec-row { margin: 12px 16px 0; display: flex; gap: 8px; }
.sec-inp {
  flex: 1; padding: 10px 14px;
  background: var(--fill); border: none; border-radius: 100px;
  font-size: calc(var(--fs)*0.9375); color: var(--text);
  font-family: inherit; outline: none;
}
.sec-inp::placeholder { color: var(--text3); }
.sec-inp:focus { background: var(--bg2); }
.add-sec-btn {
  padding: 10px 16px; background: var(--fill); border: 1px solid var(--sep2);
  border-radius: 100px; font-size: calc(var(--fs)*0.875); font-weight: 600;
  color: var(--text); cursor: pointer; font-family: inherit;
  display: flex; align-items: center; gap: 5px; white-space: nowrap;
}
.add-sec-btn:active { background: var(--bg4); }
.add-sec-btn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; }

/* SCROLL */
.scroll { flex: 1; overflow-y: auto; padding: 12px 16px 10px; -webkit-overflow-scrolling: touch; }
.scroll::-webkit-scrollbar { display: none; }

/* EMPTY STATE */
.empty { padding: 60px 20px; text-align: center; }
.empty-icon { width: 60px; height: 60px; background: var(--fill); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; }
.empty-icon svg { width: 26px; height: 26px; stroke: var(--text3); fill: none; stroke-width: 1.5; stroke-linecap: round; }
.empty p { font-size: calc(var(--fs)*0.9375); color: var(--text2); }
.empty span { font-size: calc(var(--fs)*0.8125); color: var(--text3); display: block; margin-top: 6px; }

/* SECTION */
.sec-block { margin-bottom: 10px; }
.sec-header {
  display: flex; align-items: center; gap: 8px;
  padding: 11px 14px 11px 16px;
  background: var(--fill); border-radius: 12px;
  cursor: pointer; user-select: none;
  transition: background .15s; margin-bottom: 1px;
}
.sec-header:active { background: var(--fill2); }
.sec-name { font-size: calc(var(--fs)*0.9375); font-weight: 700; color: var(--text); flex: 1; }
.sec-subtotal { font-size: calc(var(--fs)*0.875); font-weight: 700; color: var(--red); }
.sec-chev { width: 16px; height: 16px; stroke: var(--text3); fill: none; stroke-width: 2; stroke-linecap: round; transition: transform .22s; flex-shrink: 0; }
.sec-chev.open { transform: rotate(90deg); }

/* ITEMS */
.items-box { background: var(--bg2); border-radius: 12px; overflow: hidden; margin-bottom: 2px; }
.item-row { display: flex; align-items: center; gap: 10px; padding: 11px 14px; border-bottom: 1px solid var(--sep); animation: fadeIn .18s ease; }
.item-row:last-of-type { border-bottom: none; }
@keyframes fadeIn { from { opacity:0; transform:translateX(-6px); } to { opacity:1; transform:none; } }
.item-num { width: 20px; height: 20px; border-radius: 50%; background: var(--fill); font-size: calc(var(--fs)*0.6875); font-weight: 700; color: var(--text3); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.veg-dot { width: 10px; height: 10px; border-radius: 2px; border: 1.5px solid; flex-shrink: 0; position: relative; }
.veg-dot::after { content:''; position:absolute; width:5px; height:5px; border-radius:50%; top:50%; left:50%; transform:translate(-50%,-50%); }
.veg-dot.veg { border-color: var(--green); } .veg-dot.veg::after { background: var(--green); }
.veg-dot.nveg { border-color: var(--red); } .veg-dot.nveg::after { background: var(--red); }
.veg-dot.other { border-color: var(--text3); } .veg-dot.other::after { background: var(--text3); }
.item-name { flex: 1; font-size: calc(var(--fs)*0.9375); color: var(--text); min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-qty { font-size: calc(var(--fs)*0.8125); color: var(--text2); margin-left: 3px; }
.item-price { font-size: calc(var(--fs)*0.9375); font-weight: 700; color: var(--red); flex-shrink: 0; min-width: 52px; text-align: right; }
.item-del {
  background: var(--red-bg); border: none; cursor: pointer;
  color: var(--red); width: 24px; height: 24px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all .15s;
}
.item-del:active { background: var(--red); color: #fff; }
.item-del svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2.8; stroke-linecap: round; }

/* ADD ITEM FORM */
.add-item-box { background: var(--bg2); border-radius: 12px; padding: 10px 12px; margin-bottom: 2px; }
.add-inputs { display: flex; gap: 6px; align-items: center; margin-bottom: 8px; }
.inp-name { flex: 1; min-width: 80px; padding: 8px 10px; background: var(--fill); border: none; border-radius: 9px; font-size: calc(var(--fs)*0.875); color: var(--text); font-family: inherit; outline: none; }
.inp-name::placeholder { color: var(--text3); }
.inp-name:focus { background: var(--bg3); }
.inp-qty { width: 44px; padding: 8px 6px; background: var(--fill); border: none; border-radius: 9px; font-size: calc(var(--fs)*0.875); color: var(--text); font-family: inherit; outline: none; text-align: center; }
.inp-qty:focus { background: var(--bg3); }
.inp-price-wrap { position: relative; flex: 0 0 82px; }
.inp-price-pre { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); font-size: calc(var(--fs)*0.8125); color: var(--text3); pointer-events: none; }
.inp-price { width: 100%; padding: 8px 8px 8px 18px; background: var(--fill); border: none; border-radius: 9px; font-size: calc(var(--fs)*0.875); color: var(--text); font-family: inherit; outline: none; }
.inp-price::placeholder { color: var(--text3); }
.inp-price:focus { background: var(--bg3); }
.add-btn {
  background: var(--fill); border: 1px solid var(--sep2);
  border-radius: 9px; height: 34px; padding: 0 13px;
  display: flex; align-items: center; gap: 5px;
  font-size: calc(var(--fs)*0.8125); font-weight: 600;
  color: var(--text2); cursor: pointer; font-family: inherit;
  white-space: nowrap; transition: all .15s;
}
.add-btn:active { background: var(--bg4); }
.add-btn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; }
.veg-seg { display: flex; background: var(--fill); border: 1px solid var(--sep); border-radius: 8px; padding: 2px; gap: 2px; }
.vseg { flex: 1; padding: 5px 8px; border: none; border-radius: 6px; background: none; font-size: calc(var(--fs)*0.75); font-weight: 500; color: var(--text2); cursor: pointer; font-family: inherit; transition: all .15s; white-space: nowrap; }
.vseg.av { background: var(--bg2); color: var(--green); font-weight: 600; box-shadow: 0 1px 4px rgba(0,0,0,.12); }
.vseg.an { background: var(--bg2); color: var(--red); font-weight: 600; box-shadow: 0 1px 4px rgba(0,0,0,.12); }
.vseg.ao { background: var(--bg2); color: var(--text); font-weight: 600; box-shadow: 0 1px 4px rgba(0,0,0,.12); }

/* SAVE BTN */
.save-wrap { flex-shrink: 0; padding: 0 16px 16px; }
.save-btn {
  width: 100%; padding: 14px; border-radius: 14px;
  background: var(--fill); border: 1px solid var(--sep);
  font-size: calc(var(--fs)*0.9375); font-weight: 600; color: var(--text2);
  cursor: pointer; font-family: inherit;
  display: flex; align-items: center; justify-content: center; gap: 7px;
  transition: background .15s;
}
.save-btn:active { background: var(--bg4); }
.save-btn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

/* SHEETS */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 100; display: none; align-items: flex-end; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
.overlay.open { display: flex; }
.sheet {
  background: var(--glass); backdrop-filter: blur(60px) saturate(200%); -webkit-backdrop-filter: blur(60px) saturate(200%);
  border-radius: 24px 24px 0 0; border-top: 1px solid var(--glass-b);
  width: 100%; max-height: 72vh;
  display: flex; flex-direction: column;
  animation: slideUp .28s cubic-bezier(.32,0,.67,0);
  box-shadow: 0 -8px 40px rgba(0,0,0,.25);
}
.sheet.sm { max-height: 50vh; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.sheet-handle { width: 36px; height: 5px; background: var(--text3); border-radius: 3px; margin: 10px auto 0; opacity: .5; flex-shrink: 0; }
.sheet-head { padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--sep); flex-shrink: 0; }
.sheet-title { font-size: calc(var(--fs)*1.0625); font-weight: 700; color: var(--text); }
.sheet-close { background: var(--fill); border: none; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text2); }
.sheet-close svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; }
.sheet-body { padding: 16px 18px 24px; overflow-y: auto; flex: 1; }

/* VALIDATE SHEET */
.our-list { background: var(--bg2); border-radius: 12px; overflow: hidden; margin-bottom: 12px; }
.our-row { display: flex; align-items: center; padding: 10px 14px; border-bottom: 1px solid var(--sep); font-size: calc(var(--fs)*0.875); }
.our-row:last-child { border-bottom: none; }
.our-num { font-size: calc(var(--fs)*0.75); font-weight: 700; color: var(--text3); margin-right: 8px; min-width: 16px; }
.our-info { flex: 1; }
.our-name { color: var(--text); }
.our-sec { font-size: calc(var(--fs)*0.6875); color: var(--text3); margin-top: 1px; }
.our-price { color: var(--red); font-weight: 700; flex-shrink: 0; }
.our-total-row { display: flex; justify-content: space-between; padding: 11px 14px; background: var(--fill); border-radius: 10px; margin-bottom: 14px; }
.our-total-row span { font-size: calc(var(--fs)*0.9375); font-weight: 700; color: var(--text); }
.our-total-row span:last-child { color: var(--red); }
.rest-label { font-size: calc(var(--fs)*0.75); font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 7px; display: block; }
.rest-inp-wrap { position: relative; margin-bottom: 14px; }
.rest-pfx { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: calc(var(--fs)*1.1); color: var(--text3); pointer-events: none; font-weight: 600; }
.rest-inp { width: 100%; padding: 13px 13px 13px 30px; background: var(--bg2); border: 1.5px solid var(--sep2); border-radius: 12px; font-size: calc(var(--fs)*1.3); font-weight: 700; color: var(--text); font-family: inherit; outline: none; }
.rest-inp:focus { border-color: var(--red); }
.diff-card { border-radius: 14px; overflow: hidden; margin-top: 2px; }
.diff-banner { padding: 14px 16px; }
.diff-card.match .diff-banner { background: var(--green-bg); }
.diff-card.over  .diff-banner { background: var(--red-bg); }
.diff-card.under .diff-banner { background: rgba(10,132,255,.1); }
.diff-pill { display: inline-flex; align-items: center; gap: 6px; margin-bottom: 5px; }
.diff-dot { width: 8px; height: 8px; border-radius: 50%; }
.diff-card.match .diff-dot { background: var(--green); }
.diff-card.over  .diff-dot { background: var(--red); }
.diff-card.under .diff-dot { background: #0a84ff; }
.diff-pill-text { font-size: calc(var(--fs)*0.75); font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }
.diff-card.match .diff-pill-text { color: var(--green); }
.diff-card.over  .diff-pill-text { color: var(--red); }
.diff-card.under .diff-pill-text { color: #0a84ff; }
.diff-title { font-size: calc(var(--fs)*0.9375); font-weight: 700; color: var(--text); line-height: 1.35; }
.diff-sub { font-size: calc(var(--fs)*0.8125); color: var(--text2); margin-top: 4px; line-height: 1.5; }
.diff-table { background: var(--fill2); }
.diff-tr { display: flex; justify-content: space-between; align-items: center; padding: 11px 16px; border-bottom: 1px solid var(--sep); }
.diff-tr:last-child { border-bottom: none; }
.diff-td-l { font-size: calc(var(--fs)*0.8125); color: var(--text2); }
.diff-td-r { font-size: calc(var(--fs)*0.9375); font-weight: 700; color: var(--text); }
.diff-td-r.r { color: var(--red); } .diff-td-r.g { color: var(--green); } .diff-td-r.b { color: #0a84ff; }

/* SETTINGS */
.set-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid var(--sep); }
.set-row:last-child { border-bottom: none; }
.set-label { font-size: calc(var(--fs)*0.9375); color: var(--text); }
.toggle { position: relative; width: 51px; height: 31px; cursor: pointer; }
.toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
.toggle-track { position: absolute; inset: 0; background: #b0b0b5; border-radius: 100px; transition: background .2s; }
.toggle input:checked + .toggle-track { background: #34c759; }
.toggle-thumb { position: absolute; width: 27px; height: 27px; background: #fff; border-radius: 50%; top: 2px; left: 2px; transition: transform .2s; box-shadow: 0 2px 6px rgba(0,0,0,.2); }
.toggle input:checked ~ .toggle-thumb { transform: translateX(20px); }
.size-seg { display: flex; background: var(--fill); border: 1px solid var(--sep2); border-radius: 10px; padding: 3px; gap: 2px; }
.sz { padding: 7px 12px; border: none; border-radius: 7px; font-size: calc(var(--fs)*0.8125); font-weight: 600; color: var(--text2); background: none; cursor: pointer; font-family: inherit; transition: all .15s; min-width: 38px; text-align: center; }
.sz.active { background: var(--bg2); color: var(--text); font-weight: 700; box-shadow: 0 1px 6px rgba(0,0,0,.15); }

/* HISTORY */
.hist-card { background: var(--bg2); border-radius: 14px; margin-bottom: 12px; overflow: hidden; }
.hist-head { padding: 12px 14px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--sep); cursor: pointer; }
.hist-date { font-size: calc(var(--fs)*0.8125); color: var(--text2); }
.hist-right { display: flex; align-items: center; gap: 10px; }
.hist-total { font-size: calc(var(--fs)*0.9375); font-weight: 700; color: var(--red); }
.hist-del { background: none; border: none; cursor: pointer; color: var(--text3); display: flex; padding: 2px; border-radius: 5px; }
.hist-del:active { color: var(--red); }
.hist-del svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; }
.hist-body { padding: 10px 14px 14px; display: none; }
.hist-body.open { display: block; }
.hist-sec-lbl { font-size: calc(var(--fs)*0.6875); font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; padding: 7px 0 3px; }
.hist-item-row { display: flex; justify-content: space-between; font-size: calc(var(--fs)*0.875); padding: 3px 0; color: var(--text2); }
.hist-item-row span:first-child { color: var(--text); }
.hist-grand { display: flex; justify-content: space-between; padding-top: 10px; border-top: 1px solid var(--sep); margin-top: 6px; font-weight: 700; font-size: calc(var(--fs)*0.9375); color: var(--red); }
.no-hist { text-align: center; padding: 36px 20px; color: var(--text3); font-size: calc(var(--fs)*0.875); }

/* TOAST */
.toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(10px); background: var(--bg2); border: 1px solid var(--sep2); color: var(--text); padding: 10px 22px; border-radius: 100px; font-size: calc(var(--fs)*0.875); font-weight: 500; z-index: 999; opacity: 0; transition: all .22s; pointer-events: none; white-space: nowrap; box-shadow: 0 4px 20px rgba(0,0,0,.2); }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-inner">
    <div class="topbar-title">Food Menu</div>
    <div class="topbar-btns">
      <button class="icon-btn" onclick="openHistory()">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      </button>
      <button class="icon-btn" onclick="openSettings()">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- BILL STRIP -->
<div class="bill-strip">
  <div>
    <div class="bill-label">Your Total</div>
    <div class="bill-total" id="grand-total">&#8377;0</div>
    <div class="bill-sub" id="grand-sub">No items yet</div>
  </div>
  <button class="validate-btn" onclick="openValidate()">
    <svg viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
    Validate Bill
  </button>
</div>

<!-- ADD SECTION -->
<div class="add-sec-row">
  <input class="sec-inp" id="new-sec-inp" placeholder="New section (e.g. Starters)" autocorrect="off" onkeydown="if(event.key==='Enter')addSection()"/>
  <button class="add-sec-btn" onclick="addSection()">
    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Add
  </button>
</div>

<!-- SECTIONS SCROLL -->
<div class="scroll" id="scroll-wrap"></div>

<!-- SAVE BTN -->
<div class="save-wrap" id="save-wrap" style="display:none">
  <button class="save-btn" onclick="saveSession()">
    <svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
    Save Order to History
  </button>
</div>

<!-- VALIDATE OVERLAY -->
<div class="overlay" id="val-overlay" onclick="closeOuter(event,'val-overlay')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-head">
      <div class="sheet-title">Validate Bill</div>
      <button class="sheet-close" onclick="closeSheet('val-overlay')"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="sheet-body" id="val-body"></div>
  </div>
</div>

<!-- HISTORY OVERLAY -->
<div class="overlay" id="hist-overlay" onclick="closeOuter(event,'hist-overlay')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-head">
      <div class="sheet-title">Past Orders</div>
      <button class="sheet-close" onclick="closeSheet('hist-overlay')"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="sheet-body" id="hist-body"></div>
  </div>
</div>

<!-- SETTINGS OVERLAY -->
<div class="overlay" id="set-overlay" onclick="closeOuter(event,'set-overlay')">
  <div class="sheet sm">
    <div class="sheet-handle"></div>
    <div class="sheet-head">
      <div class="sheet-title">Settings</div>
      <button class="sheet-close" onclick="closeSheet('set-overlay')"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="sheet-body">
      <div class="set-row">
        <span class="set-label">Dark Mode</span>
        <label class="toggle">
          <input type="checkbox" id="dark-chk" onchange="setDark(this.checked)"/>
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </div>
      <div class="set-row">
        <span class="set-label">Text Size</span>
        <div class="size-seg">
          <button class="sz" data-s="14" onclick="setFont(14,this)">S</button>
          <button class="sz active" data-s="16" onclick="setFont(16,this)">M</button>
          <button class="sz" data-s="18" onclick="setFont(18,this)">L</button>
          <button class="sz" data-s="20" onclick="setFont(20,this)">XL</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';

// ── STATE ─────────────────────────────────────────────
let sections = [];
let sessions = [];
let dark = true;
let fs = 16;
let secVeg = {};

try {
  const d = JSON.parse(localStorage.getItem('fm_v5') || '{}');
  if (d.sections) sections = d.sections;
  if (d.sessions) sessions = d.sessions;
  if (d.dark !== undefined) dark = d.dark;
  if (d.fs) fs = d.fs;
} catch(e) {}

function save() {
  try { localStorage.setItem('fm_v5', JSON.stringify({sections, sessions, dark, fs})); } catch(e) {}
}

// ── INIT THEME ────────────────────────────────────────
applyDark();
applyFont();

function applyDark() {
  document.body.classList.toggle('light', !dark);
  document.getElementById('theme-meta').content = dark ? '#000000' : '#f2f2f7';
  const chk = document.getElementById('dark-chk');
  if (chk) chk.checked = dark;
}
function applyFont() {
  document.documentElement.style.setProperty('--fs', fs + 'px');
  document.querySelectorAll('.sz').forEach(b => b.classList.toggle('active', +b.dataset.s === fs));
}
function setDark(v) { dark = v; save(); applyDark(); }
function setFont(size, btn) { fs = size; save(); applyFont(); }

// ── HELPERS ───────────────────────────────────────────
const uid  = () => Date.now().toString(36) + Math.random().toString(36).substr(2,4);
const esc  = s  => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const fmt  = n  => '\u20b9' + Number(n).toLocaleString('en-IN');
const grandTotal = () => sections.reduce((a,s) => a + s.items.reduce((b,i) => b + i.price*i.qty, 0), 0);
const itemCount  = () => sections.reduce((a,s) => a + s.items.reduce((b,i) => b + i.qty, 0), 0);
function nowStr() {
  const d = new Date();
  return d.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})
    + '  ' + d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
}

// ── TOAST ─────────────────────────────────────────────
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 1800);
}

// ── SECTIONS ──────────────────────────────────────────
function addSection() {
  const inp = document.getElementById('new-sec-inp');
  const name = inp.value.trim();
  if (!name) { toast('Enter a section name'); return; }
  sections.push({ id: uid(), name, open: true, items: [] });
  inp.value = '';
  save(); render();
}

function deleteSection(id) {
  if (!confirm('Delete this section and all its items?')) return;
  sections = sections.filter(s => s.id !== id);
  save(); render();
}

function toggleSection(id) {
  const s = sections.find(x => x.id === id);
  if (!s) return;
  s.open = !s.open;
  save();
  const body = document.getElementById('sb-' + id);
  const chev = document.getElementById('sc-' + id);
  if (body) body.style.display = s.open ? 'block' : 'none';
  if (chev) chev.classList.toggle('open', s.open);
}

// ── ITEMS ─────────────────────────────────────────────
function addItem(sid) {
  const ne = document.getElementById('in-' + sid);
  const qe = document.getElementById('iq-' + sid);
  const pe = document.getElementById('ip-' + sid);
  const name = ne ? ne.value.trim() : '';
  if (!name) { toast('Enter item name'); return; }
  const qty = Math.max(1, parseInt(qe.value) || 1);
  const price = parseFloat(pe.value) || 0;
  const veg = secVeg[sid] || 'other';
  const s = sections.find(x => x.id === sid);
  if (!s) return;
  s.items.push({ id: uid(), name, qty, price, veg });
  ne.value = ''; pe.value = '';
  save(); render();
  toast(name + (qty > 1 ? ' \xd7' + qty : '') + ' added');
}

function deleteItem(sid, iid) {
  const s = sections.find(x => x.id === sid);
  if (!s) return;
  s.items = s.items.filter(i => i.id !== iid);
  save(); render();
}

function setVeg(sid, mode) {
  secVeg[sid] = mode;
  ['veg','nveg','other'].forEach(m => {
    const b = document.getElementById('vb-' + sid + '-' + m);
    if (b) b.className = 'vseg' + (m === mode ? (m==='veg'?' av':m==='nveg'?' an':' ao') : '');
  });
}

// ── RENDER ────────────────────────────────────────────
function render() {
  const wrap = document.getElementById('scroll-wrap');
  const saveWrap = document.getElementById('save-wrap');
  const total = grandTotal();
  const count = itemCount();

  document.getElementById('grand-total').textContent = fmt(total);
  document.getElementById('grand-sub').textContent = count === 0 ? 'No items yet' : count + (count===1?' item':' items') + ' logged';
  if (saveWrap) saveWrap.style.display = sections.some(s=>s.items.length) ? 'block' : 'none';

  if (!sections.length) {
    wrap.innerHTML = `<div class="empty">
      <div class="empty-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
      <p>Add a section to get started</p>
      <span>e.g. Starters &rarr; Veg Manchurian &rarr; &#8377;160</span>
    </div>`;
    return;
  }

  let globalIdx = 0;
  wrap.innerHTML = sections.map(s => {
    const vm = secVeg[s.id] || 'other';
    const secTotal = s.items.reduce((a,i) => a + i.price*i.qty, 0);
    const itemsHtml = s.items.map(i => {
      globalIdx++;
      return `<div class="item-row">
        <div class="item-num">${globalIdx}</div>
        <div class="veg-dot ${i.veg}"></div>
        <div class="item-name">${esc(i.name)}${i.qty>1?`<span class="item-qty">&times;${i.qty}</span>`:''}</div>
        <div class="item-price">${i.price>0?fmt(i.price*i.qty):'&mdash;'}</div>
        <button class="item-del" onclick="deleteItem('${s.id}','${i.id}')">
          <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>`;
    }).join('');

    return `<div class="sec-block">
      <div class="sec-header" onclick="toggleSection('${s.id}')">
        <span class="sec-name">${esc(s.name)}</span>
        ${secTotal > 0 ? `<span class="sec-subtotal">${fmt(secTotal)}</span>` : ''}
        <svg class="sec-chev ${s.open?'open':''}" id="sc-${s.id}" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
      <div id="sb-${s.id}" style="display:${s.open?'block':'none'}">
        <div class="items-box">${itemsHtml}</div>
        <div class="add-item-box">
          <div class="add-inputs">
            <input class="inp-name" id="in-${s.id}" placeholder="Item name" autocorrect="off"
              onkeydown="if(event.key==='Enter')document.getElementById('ip-${s.id}').focus()"/>
            <input class="inp-qty" id="iq-${s.id}" type="number" value="1" min="1"/>
            <div class="inp-price-wrap">
              <span class="inp-price-pre">&#8377;</span>
              <input class="inp-price" id="ip-${s.id}" type="number" placeholder="Price" min="0"
                onkeydown="if(event.key==='Enter')addItem('${s.id}')"/>
            </div>
            <button class="add-btn" onclick="addItem('${s.id}')">
              <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Add
            </button>
          </div>
          <div class="veg-seg">
            <button class="vseg${vm==='veg'?' av':''}" id="vb-${s.id}-veg"   onclick="setVeg('${s.id}','veg')">Veg</button>
            <button class="vseg${vm==='nveg'?' an':''}" id="vb-${s.id}-nveg" onclick="setVeg('${s.id}','nveg')">Non-Veg</button>
            <button class="vseg${vm==='other'?' ao':''}" id="vb-${s.id}-other" onclick="setVeg('${s.id}','other')">Other</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── VALIDATE ──────────────────────────────────────────
function openValidate() {
  const total = grandTotal();
  const allItems = sections.flatMap(s => s.items.map(i => ({...i, secName: s.name})));
  if (!allItems.length) { toast('Add items first'); return; }
  let idx = 0;
  const rows = allItems.map(i => {
    idx++;
    return `<div class="our-row">
      <span class="our-num">${idx}</span>
      <div class="our-info">
        <div class="our-name">${esc(i.name)}${i.qty>1?' &times;'+i.qty:''}</div>
        <div class="our-sec">${esc(i.secName)}</div>
      </div>
      <div class="our-price">${i.price>0?fmt(i.price*i.qty):'&mdash;'}</div>
    </div>`;
  }).join('');

  document.getElementById('val-body').innerHTML = `
    <div class="our-list">${rows}</div>
    <div class="our-total-row"><span>Your Total</span><span>${fmt(total)}</span></div>
    <label class="rest-label">Restaurant Bill Amount</label>
    <div class="rest-inp-wrap">
      <span class="rest-pfx">&#8377;</span>
      <input class="rest-inp" id="rest-inp" type="number" placeholder="0" inputmode="decimal" oninput="doValidate(${total})"/>
    </div>
    <div id="diff-out"></div>`;
  document.getElementById('val-overlay').classList.add('open');
  setTimeout(() => { try { document.getElementById('rest-inp').focus(); } catch(e){} }, 350);
}

function doValidate(ourTotal) {
  const rest = parseFloat(document.getElementById('rest-inp').value) || 0;
  const el = document.getElementById('diff-out');
  if (!rest) { el.innerHTML = ''; return; }
  const diff = rest - ourTotal, abs = Math.abs(diff);
  const pct = ourTotal > 0 ? (abs/ourTotal*100).toFixed(1) : 0;
  let cls, pill, title, sub, dc;
  if (abs <= 5) {
    cls='match'; pill='Match'; title='Bills are identical';
    sub='Difference of '+fmt(abs)+' is within rounding. All good!'; dc='g';
  } else if (diff > 0) {
    cls='over'; pill='Overcharged'; title='Restaurant charged '+fmt(abs)+' more ('+pct+'%)';
    sub='Check for extra items, service charge, or items you may have missed.'; dc='r';
  } else {
    cls='under'; pill='Undercharged'; title='Restaurant charged '+fmt(abs)+' less ('+pct+'%)';
    sub='Possible discount or different tax structure. Verify with staff.'; dc='b';
  }
  el.innerHTML = `<div class="diff-card ${cls}">
    <div class="diff-banner">
      <div class="diff-pill"><div class="diff-dot"></div><span class="diff-pill-text">${pill}</span></div>
      <div class="diff-title">${title}</div>
      <div class="diff-sub">${sub}</div>
    </div>
    <div class="diff-table">
      <div class="diff-tr"><span class="diff-td-l">Your total</span><span class="diff-td-r r">${fmt(ourTotal)}</span></div>
      <div class="diff-tr"><span class="diff-td-l">Restaurant bill</span><span class="diff-td-r">${fmt(rest)}</span></div>
      <div class="diff-tr"><span class="diff-td-l">Difference</span><span class="diff-td-r ${dc}">${diff>=0?'+':''}${fmt(diff)}</span></div>
    </div>
  </div>`;
}

// ── SESSIONS ──────────────────────────────────────────
function saveSession() {
  if (!sections.some(s => s.items.length)) { toast('Nothing to save'); return; }
  sessions.unshift({
    id: uid(), date: nowStr(), total: grandTotal(),
    sections: sections.filter(s=>s.items.length).map(s=>({
      name: s.name,
      items: s.items.map(i=>({name:i.name, qty:i.qty, price:i.price, veg:i.veg}))
    }))
  });
  if (sessions.length > 30) sessions = sessions.slice(0,30);
  sections = []; secVeg = {};
  save(); render(); toast('Order saved!');
}

function openHistory() {
  const body = document.getElementById('hist-body');
  if (!sessions.length) { body.innerHTML = '<div class="no-hist">No past orders yet</div>'; }
  else {
    body.innerHTML = sessions.map(s => `
      <div class="hist-card">
        <div class="hist-head" onclick="toggleHist('${s.id}')">
          <div>
            <div style="font-size:calc(var(--fs)*0.9375);font-weight:600;color:var(--text)">${fmt(s.total)}</div>
            <div class="hist-date">${s.date}</div>
          </div>
          <div class="hist-right">
            <button class="hist-del" onclick="event.stopPropagation();delSession('${s.id}')">
              <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
            </button>
            <svg style="width:14px;height:14px;stroke:var(--text3);fill:none;stroke-width:2;stroke-linecap:round" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
          </div>
        </div>
        <div class="hist-body" id="hb-${s.id}">
          ${s.sections.map(sec=>`
            <div class="hist-sec-lbl">${esc(sec.name)}</div>
            ${sec.items.map(i=>`<div class="hist-item-row">
              <span>${esc(i.name)}${i.qty>1?' &times;'+i.qty:''}</span>
              <span>${i.price>0?fmt(i.price*i.qty):'&mdash;'}</span>
            </div>`).join('')}`).join('')}
          <div class="hist-grand"><span>Total</span><span>${fmt(s.total)}</span></div>
        </div>
      </div>`).join('');
  }
  document.getElementById('hist-overlay').classList.add('open');
}

function toggleHist(id) {
  const b = document.getElementById('hb-' + id);
  if (b) b.classList.toggle('open');
}
function delSession(id) {
  sessions = sessions.filter(s => s.id !== id);
  save(); openHistory();
}

// ── SETTINGS ──────────────────────────────────────────
function openSettings() {
  document.getElementById('dark-chk').checked = dark;
  document.querySelectorAll('.sz').forEach(b => b.classList.toggle('active', +b.dataset.s === fs));
  document.getElementById('set-overlay').classList.add('open');
}

// ── SHEETS ────────────────────────────────────────────
function closeSheet(id) { document.getElementById(id).classList.remove('open'); }
function closeOuter(e, id) { if (e.target === document.getElementById(id)) closeSheet(id); }

// ── INIT ──────────────────────────────────────────────
render();
</script>
</body>
</html>
